<title>Infiterra — Action Points</title>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --navy:  #1B2A4A;
    --coral: #ED3153;
    --blue:  #5B7FA5;
    --green: #27AE60;
    --amber: #F39C12;
    --fog:   #F4F6F9;
    --line:  #E2E8F0;
    --muted: #7A8CA0;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    font-family: 'DM Sans', sans-serif;
    background: #fff;
    color: var(--navy);
    overflow: auto;
  }

  .slide {
    width: 100%; height: 100%;
    display: grid;
    grid-template-rows: auto auto 1fr auto;
  }

  /* ── HEADER ── */
  .slide-header {
    background: var(--navy);
    padding: 18px 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
  }
  .slide-header::after {
    content: '';
    position: absolute;
    right: -40px; top: -60px;
    width: 220px; height: 220px;
    background: radial-gradient(circle, rgba(237,49,83,0.1) 0%, transparent 70%);
    pointer-events: none;
  }
  .header-left { display: flex; align-items: center; gap: 22px; }
  .logo-svg { height: 18px; opacity: 0.9; }
  .header-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.38);
    font-family: 'DM Mono', monospace;
    margin-bottom: 2px;
  }
  .header-title {
    font-size: 24px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.3px;
    line-height: 1;
  }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .meta-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.11);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 11px;
    color: rgba(255,255,255,0.55);
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  .meta-pill:hover { background: rgba(255,255,255,0.12); }
  .meta-pill .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--coral);
    animation: blink 2.2s ease-in-out infinite;
  }
  @keyframes blink {
    0%,100% { opacity:1; transform:scale(1); }
    50%      { opacity:.45; transform:scale(.8); }
  }

  /* ── TOOLBAR ── */
  .toolbar {
    background: var(--fog);
    border-bottom: 1px solid var(--line);
    padding: 8px 52px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .toolbar-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-right: 4px;
  }
  .filter-btn {
    font-size: 11px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 4px;
    border: 1px solid var(--line);
    background: #fff;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.14s;
    font-family: 'DM Sans', sans-serif;
  }
  .filter-btn:hover { border-color: var(--navy); color: var(--navy); }
  .filter-btn.active { background: var(--navy); color: #fff; border-color: var(--navy); }
  .spacer { flex: 1; }
  .count-chip {
    font-size: 11px;
    font-weight: 600;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
  }
  .count-chip span {
    color: var(--navy);
    font-weight: 700;
  }

  /* ── BODY ── */
  .slide-body {
    overflow-y: auto;
    padding: 0 52px 20px;
  }
  .slide-body::-webkit-scrollbar { width: 4px; }
  .slide-body::-webkit-scrollbar-track { background: transparent; }
  .slide-body::-webkit-scrollbar-thumb { background: var(--line); border-radius: 2px; }

  /* ── TABLE ── */
  .action-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 16px;
  }

  .action-table thead tr {
    background: var(--navy);
  }
  .action-table thead th {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.65);
    padding: 10px 14px;
    text-align: left;
    font-family: 'DM Mono', monospace;
    white-space: nowrap;
  }
  .action-table thead th:last-child { text-align: center; }

  /* Column widths */
  .col-deal   { width: 22%; }
  .col-action { width: 40%; }
  .col-owner  { width: 16%; }
  .col-due    { width: 14%; }
  .col-status { width: 8%; text-align: center; }

  .action-row {
    border-bottom: 1px solid var(--line);
    cursor: pointer;
    transition: background 0.13s;
    animation: fadeRow 0.3s ease both;
    user-select: none;
  }
  .action-row:hover { background: var(--fog); }
  .action-row.done td { opacity: 0.38; }
  .action-row.done .deal-name { text-decoration: line-through; }

  @keyframes fadeRow {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .action-row td {
    padding: 11px 14px;
    vertical-align: middle;
    font-size: 13px;
    color: var(--navy);
  }

  .deal-name {
    font-weight: 600;
    font-size: 13px;
    line-height: 1.3;
  }
  .deal-owner-mobile { display: none; }

  .action-text {
    font-size: 13px;
    line-height: 1.45;
    color: #2c3e50;
  }

  .owner-cell {
    font-size: 12px;
    font-weight: 500;
  }
  .owner-tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(91,127,165,0.1);
    color: var(--blue);
    border-radius: 4px;
    padding: 3px 8px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }

  .due-cell {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    font-family: 'DM Mono', monospace;
  }
  .due-cell.overdue { color: var(--coral); font-weight: 600; }
  .due-cell.soon { color: var(--amber); font-weight: 600; }
  .due-date-input {
    font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted);
    border: 1px solid transparent; border-radius: 4px; padding: 3px 6px;
    background: transparent; cursor: pointer; outline: none;
    transition: border-color .15s, background .15s;
  }
  .due-date-input:hover { border-color: var(--line); background: rgba(91,127,165,0.05); }
  .due-date-input:focus { border-color: var(--blue); background: #fff; }

  .status-cell { text-align: center; }
  .done-indicator {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid var(--line);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: transparent;
    margin: 0 auto;
    transition: all 0.15s;
    pointer-events: none;
  }
  .action-row:hover .done-indicator { border-color: rgba(27,42,74,0.3); }
  .action-row.done .done-indicator  { background: var(--green); border-color: var(--green); color: #fff; }

  /* OVERDUE badge */
  .overdue-badge {
    display: inline-block;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: rgba(237,49,83,0.1);
    color: var(--coral);
    border-radius: 3px;
    padding: 1px 5px;
    margin-left: 6px;
    vertical-align: middle;
  }

  /* EMPTY STATE */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 0;
    color: var(--muted);
    gap: 8px;
  }
  .empty-state .empty-icon { font-size: 32px; opacity: 0.4; }
  .empty-state p { font-size: 14px; }

  /* ── FOOTER ── */
  .slide-footer {
    border-top: 1px solid var(--line);
    padding: 10px 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .footer-source {
    font-size: 10px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    opacity: 0.6;
  }
  .footer-nav { display: flex; align-items: center; gap: 6px; }
  .nav-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--line); transition: all .15s; }
  .nav-dot.current { background: var(--navy); width: 20px; border-radius: 4px; }
</style>
</head>

<script>
// ── SCHEMA ────────────────────────────────────────────────────────────────────
// Reads from data.json (served by Flask backend)
// Expected (parse_action_points.py format): {
//   action_points: [{ id, title, owner, source_meeting, due, status, deal, notes, verification, last_checked, cadence }]
// }

// ── STATE ─────────────────────────────────────────────────────────────────────
var allItems = [];   // {id, deal, action, owner, by_when, status, overdue, source, done}
var currentFilter = 'open';
var _isOfficeEnv = false;

// ── HELPERS ───────────────────────────────────────────────────────────────────
function esc(s) {
  var d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function fmtDate(str) {
  if (!str) return '—';
  try {
    var d = new Date(str + 'T00:00:00');
    var M = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return d.getDate() + ' ' + M[d.getMonth()];
  } catch(e) { return str; }
}

function dueCls(byWhen) {
  if (!byWhen) return '';
  var s = byWhen.toString().toLowerCase();
  if (s.indexOf('next call') !== -1 || s.indexOf('tbd') !== -1) return '';
  // Try parsing
  try {
    var d = new Date(byWhen + (byWhen.length <= 6 ? ' 2026' : ''));
    var now = new Date();
    var diff = (d - now) / 86400000;
    if (diff < 0)  return 'overdue';
    if (diff < 3)  return 'soon';
  } catch(e) {}
  return '';
}

function flashButton(btn, msg, color) {
  var orig = btn.textContent;
  btn.textContent = msg;
  btn.style.color = color;
  setTimeout(function() { btn.textContent = orig; btn.style.color = ''; }, 2000);
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  var tbody = document.getElementById('action-tbody');
  tbody.innerHTML = '';
  var shown = 0;

  allItems.forEach(function(item, idx) {
    var isDone = !!item.done;
    var isOverdue = item.overdue && !isDone;

    // Filter
    if (currentFilter === 'open'    && isDone) return;
    if (currentFilter === 'done'    && !isDone) return;
    if (currentFilter === 'overdue' && (!isOverdue || isDone)) return;

    shown++;
    var rowCls = 'action-row' + (isDone ? ' done' : '');
    var dc = dueCls(item.by_when);
    var dueCellCls = 'due-cell' + (dc ? ' ' + dc : '');
    var dueTxt = item.by_when || 'Next Call';

    var overdueBadge = isOverdue
      ? '<span class="overdue-badge">overdue</span>'
      : '';

    var row = document.createElement('tr');
    row.className = rowCls;
    row.setAttribute('data-id', item.id);
    row.style.animationDelay = (idx * 0.04) + 's';
    row.onclick = function(e) {
      if (e.target.classList && e.target.classList.contains('due-edit')) return;
      toggleDone(item.id, e);
    };

    row.innerHTML =
      '<td class="col-deal">' +
        '<div class="deal-name">' + esc(item.deal) + overdueBadge + '</div>' +
        (item.source ? '<div style="font-size:10px;color:var(--muted);margin-top:2px">from: ' + esc(item.source) + '</div>' : '') +
      '</td>' +
      '<td class="col-action"><div class="action-text">' + esc(item.action) + '</div></td>' +
      '<td class="col-owner"><span class="owner-tag">' + esc(item.owner) + '</span></td>' +
      '<td class="col-due">' +
        '<input type="date" class="due-date-input" ' +
          'value="' + (item.dateVal || '') + '" ' +
          'onclick="event.stopPropagation()" ' +
          'onchange="saveDate(this,\'' + item.id + '\')" ' +
          'title="Click to set date">' +
      '</td>' +
      '<td class="col-status status-cell">' +
        '<div class="done-indicator">✓</div>' +
      '</td>';

    tbody.appendChild(row);
  });

  document.getElementById('visible-count').textContent = shown;
  document.getElementById('empty-state').style.display = shown === 0 ? 'flex' : 'none';
  document.getElementById('action-table').style.display = shown === 0 ? 'none' : '';
}

function toggleDone(id, evt) {
  evt.preventDefault();
  evt.stopPropagation();
  for (var i = 0; i < allItems.length; i++) {
    if (allItems[i].id === id) {
      allItems[i].done = !allItems[i].done;
      allItems[i].status = allItems[i].done ? 'DONE' : 'OPEN';
      break;
    }
  }
  render();
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(function(b) {
    b.classList.toggle('active', b.getAttribute('data-filter') === f);
  });
  render();
}

// ── LOAD ──────────────────────────────────────────────────────────────────────
function loadData(data) {
  var aps = data.action_points || [];

  // Derive source meeting from first item if available
  var meeting = (aps.length && aps[0].source_meeting) ? aps[0].source_meeting : 'Forecast Call';
  document.getElementById('source-meeting').textContent = meeting;
  document.getElementById('footer-source').textContent = 'source: action tracker';

  allItems = [];

  // Default due date: next Tuesday
  var now = new Date();
  var daysUntilTue = (2 - now.getDay() + 7) % 7 || 7;
  var tue = new Date(now.getTime() + daysUntilTue * 86400000);
  var nextTuesday = tue.toISOString().slice(0, 10);

  aps.forEach(function(ap) {
    var statusUpper = (ap.status || 'OPEN').toUpperCase();
    var isDone = statusUpper === 'DONE';
    var isOverdue = statusUpper === 'OVERDUE';

    // Extract ISO date if present for the date input
    var rawDue = ap.due || '';
    var dateVal = /^\d{4}-\d{2}-\d{2}/.test(rawDue) ? rawDue.match(/\d{4}-\d{2}-\d{2}/)[0] : nextTuesday;

    allItems.push({
      id:      ap.id || ('ap_' + allItems.length),
      deal:    ap.deal || '',
      action:  ap.title || '',
      owner:   ap.owner || '—',
      by_when: dateVal,
      dateVal: dateVal,
      status:  ap.status || 'OPEN',
      overdue: isOverdue,
      source:  ap.source_meeting || null,
      done:    isDone,
    });
  });

  render();
}

// ── SAVE & REFRESH ────────────────────────────────────────────────────────────
function saveData() {
  var btn = document.getElementById('btn-save');
  var payload = allItems.map(function(item) {
    return {
      id: item.id,
      title: item.action,
      owner: item.owner,
      deal: item.deal,
      due: item.by_when,
      status: item.status,
      source_meeting: item.source,
    };
  });

  btn.textContent = 'Saving...';
  fetch('save', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action_points: payload })
  })
  .then(function(r) {
    if (!r.ok) throw new Error('Save failed');
    flashButton(btn, 'Saved!', '#27AE60');
  })
  .catch(function(e) {
    flashButton(btn, 'Error!', '#ED3153');
  });
}

function refreshData() {
  var btn = document.getElementById('btn-refresh');
  btn.textContent = 'Refreshing...';
  fetch('refresh', { method: 'POST' })
  .then(function(r) {
    if (!r.ok) throw new Error('Refresh failed');
    return fetch('data.json');
  })
  .then(function(r) {
    if (!r.ok) throw new Error('No data');
    return r.json();
  })
  .then(function(d) {
    loadData(d);
    flashButton(btn, 'Done!', '#27AE60');
  })
  .catch(function(e) {
    flashButton(btn, 'Error!', '#ED3153');
  });
}

// ── DATE EDITING ──────────────────────────────────────────────────────────────
function saveDate(el, id) {
  var val = el.value || '';
  for (var i = 0; i < allItems.length; i++) {
    if (allItems[i].id === id) {
      allItems[i].by_when = val;
      allItems[i].dateVal = val;
      break;
    }
  }
  render();
}

// ── SLIDE NAV (Office.js) ────────────────────────────────────────────────────
function goToSlide(direction) {
  if (!_isOfficeEnv) return;
  try {
    Office.context.document.goToByIdAsync(
      direction === 'next' ? Office.Index.Next : Office.Index.Previous,
      Office.GoToType.Index,
      function(r) {}
    );
  } catch(e) {}
}

function showSlideNav() {
  if (_isOfficeEnv) {
    document.getElementById('btn-prev').style.display = 'inline-block';
    document.getElementById('btn-next').style.display = 'inline-block';
  }
}

// ── INIT ─────────────────────────────────────────────────────────────────────
function init() {
  if (window.Office && Office.context && Office.context.document) {
    _isOfficeEnv = true;
  }
  showSlideNav();

  fetch('data.json')
    .then(function(r) {
      if (!r.ok) throw new Error('No data');
      return r.json();
    })
    .then(function(d) { loadData(d); })
    .catch(function() {
      // Empty state — no fallback data
      document.getElementById('source-meeting').textContent = 'No data loaded';
      document.getElementById('footer-source').textContent = 'source: —';
      allItems = [];
      render();
    });
}

var _initDone = false;
function safeInit() {
  if (_initDone) return;
  _initDone = true;
  init();
}
document.addEventListener('DOMContentLoaded', safeInit);
</script>
</body>
</html>
