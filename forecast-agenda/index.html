<head>

<title>Infiterra — Agenda</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --navy:  #1B2A4A;
    --coral: #ED3153;
    --blue:  #5B7FA5;
    --fog:   #F4F6F9;
    --line:  #E2E8F0;
    --muted: #7A8CA0;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    font-family: 'DM Sans', sans-serif;
    background: #fff;
    color: var(--navy);
    overflow: auto;
  }

  .slide {
    width: 100%; height: 100%;
    display: grid;
    grid-template-rows: auto 1fr auto;
  }

  /* ── HEADER ── */
  .slide-header {
    background: var(--navy);
    padding: 20px 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
  }
  .slide-header::after {
    content: '';
    position: absolute;
    right: -40px; top: -60px;
    width: 220px; height: 220px;
    background: radial-gradient(circle, rgba(237,49,83,0.1) 0%, transparent 70%);
    pointer-events: none;
  }
  .header-left { display: flex; align-items: center; gap: 22px; }
  .logo-svg { height: 20px; opacity: 0.9; }
  .header-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.38);
    font-family: 'DM Mono', monospace;
    margin-bottom: 3px;
  }
  .header-title {
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.3px;
    line-height: 1;
  }
  .meta-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.11);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    font-weight: 500;
  }
  .meta-pill .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--coral);
    animation: blink 2.2s ease-in-out infinite;
  }
  @keyframes blink {
    0%,100% { opacity:1; transform:scale(1); }
    50%      { opacity:.45; transform:scale(.8); }
  }

  /* ── BODY ── */
  .slide-body {
    display: flex;
    align-items: center;
    padding: 0 52px;
    background: #fff;
    position: relative;
    overflow: hidden;
  }
  .slide-body::before {
    content: '';
    position: absolute;
    right: -60px; bottom: -60px;
    width: 440px; height: 440px;
    background: radial-gradient(circle, rgba(27,42,74,0.025) 0%, transparent 65%);
    pointer-events: none;
  }

  .agenda-list {
    width: 100%;
  }

  /* ── ITEM ── */
  .agenda-item {
    display: grid;
    grid-template-columns: 96px 1fr auto;
    align-items: center;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
    position: relative;
    transition: background 0.16s ease;
    text-decoration: none;
    color: inherit;
    animation: rise 0.45s ease both;
  }
  .agenda-item:first-child { border-top: 1px solid var(--line); }
  .agenda-item:nth-child(1) { animation-delay: 0.04s; }
  .agenda-item:nth-child(2) { animation-delay: 0.12s; }
  .agenda-item:nth-child(3) { animation-delay: 0.20s; }
  @keyframes rise {
    from { opacity:0; transform:translateY(10px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .agenda-item:hover  { background: var(--fog); }
  .agenda-item.active { background: var(--fog); }

  /* coral accent bar */
  .agenda-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--coral);
    transform: scaleY(0);
    transform-origin: center;
    transition: transform 0.18s ease;
    border-radius: 0 2px 2px 0;
  }
  .agenda-item:hover::before,
  .agenda-item.active::before { transform: scaleY(1); }

  /* Number column */
  .item-num {
    font-size: 52px;
    font-weight: 700;
    color: var(--navy);
    text-align: right;
    /* gap between num col edge and text — right padding creates the separation */
    padding: 28px 28px 28px 20px;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    opacity: 0.12;
    transition: opacity 0.16s, color 0.16s;
    user-select: none;
    letter-spacing: -2px;
  }
  .agenda-item:hover .item-num,
  .agenda-item.active .item-num {
    opacity: 1;
    color: var(--coral);
  }

  /* Divider line between number and text */
  .item-divider {
    width: 1px;
    height: 36px;
    background: var(--line);
    margin-right: 28px;
    flex-shrink: 0;
    transition: background 0.16s;
  }
  .agenda-item:hover .item-divider,
  .agenda-item.active .item-divider {
    background: rgba(237,49,83,0.25);
  }

  /* Content */
  .item-content {
    padding: 28px 20px 28px 0;
    display: flex;
    flex-direction: column;
    gap: 5px;
    /* the divider is inside item-content as first child */
  }
  .item-inner {
    display: flex;
    align-items: center;
    gap: 28px;
  }
  .item-text { flex: 1; display: flex; flex-direction: column; gap: 5px; }

  .item-title {
    font-size: 21px;
    font-weight: 600;
    color: var(--navy);
    letter-spacing: -0.2px;
    line-height: 1.25;
  }
  .item-sub {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .item-sub-label {
    font-size: 12px;
    color: var(--muted);
    font-weight: 400;
  }
  .sub-chip {
    font-size: 11px;
    font-weight: 500;
    color: var(--blue);
    background: rgba(91,127,165,0.1);
    border-radius: 3px;
    padding: 2px 7px;
    white-space: nowrap;
  }

  /* Badge */
  .item-badge {
    padding: 28px 36px 28px 12px;
    display: flex;
    align-items: center;
  }
  .badge-tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 4px;
    white-space: nowrap;
    opacity: 0;
    transform: translateX(6px);
    transition: all 0.16s ease;
  }
  .agenda-item:hover .badge-tag,
  .agenda-item.active .badge-tag {
    opacity: 1;
    transform: translateX(0);
  }
  .badge-revops { background: rgba(27,42,74,0.07); color: var(--navy); }
  .badge-reps   { background: rgba(237,49,83,0.08); color: var(--coral); }

  /* ── FOOTER ── */
  .slide-footer {
    border-top: 1px solid var(--line);
    padding: 11px 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .footer-tagline { font-size: 11px; color: var(--muted); font-style: italic; opacity: .65; }
  .footer-nav { display: flex; align-items: center; gap: 6px; }
  .nav-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--line); transition: all .15s; }
  .nav-dot.current { background: var(--navy); width: 20px; border-radius: 4px; }
</style>
</head>

    <button id="btn-prev" onclick="goToSlide('prev')" style="display:none; padding:4px 14px; border:1px solid #E2E8F0; border-radius:4px; cursor:pointer; background:#fff; font-size:12px; font-weight:600; color:#7A8CA0; font-family:'DM Sans',sans-serif;">&#9664; Prev</button>

<script>
// ── DATA ─────────────────────────────────────────────────────────────────────
// Override by placing data/agenda.json next to this file on the static server.
// Schema: { meeting_date?: "YYYY-MM-DD", items?: AgendaItem[] }
// AgendaItem: { title, sub?: string[], ownerDisplay, badge: "revops"|"reps", href?: string }

var DEFAULT_AGENDA = [
  {
    title: "Review Previous Action Points",
    sub: [],
    ownerDisplay: "Rev Ops",
    badge: "revops"
  },
  {
    title: "Rep-Level Snapshot",
    sub: ["Coverage tracker", "Key milestones", "Talking points"],
    ownerDisplay: "Rev Ops",
    badge: "revops"
  },
  {
    title: "Support Pillar Activation Matrix",
    sub: ["ABM", "Solutions Consultant", "Product Marketing", "C-Suite / Exec"],
    ownerDisplay: "Rev Ops",
    badge: "revops"
  }
];

// ── HELPERS ──────────────────────────────────────────────────────────────────
function fmtDate(d) {
  var M = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var D = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  return D[d.getDay()] + ' ' + d.getDate() + ' ' + M[d.getMonth()] + ' ' + d.getFullYear();
}
function esc(s) {
  var el = document.createElement('div');
  el.textContent = s || '';
  return el.innerHTML;
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render(items) {
  var list = document.getElementById('agenda-list');
  list.innerHTML = '';

  items.forEach(function(item, i) {
    var a = document.createElement('a');
    a.className = 'agenda-item';
    a.href = item.href || '#';

    // Sub-chips HTML
    var subHtml = '';
    if (item.sub && item.sub.length) {
      subHtml = '<div class="item-sub">' +
        item.sub.map(function(s) {
          return '<span class="sub-chip">' + esc(s) + '</span>';
        }).join('') +
      '</div>';
    }

    a.innerHTML =
      '<div class="item-num">' + String(i + 1).padStart(2, '0') + '</div>' +
      '<div class="item-content">' +
        '<div class="item-inner">' +
          '<div class="item-divider"></div>' +
          '<div class="item-text">' +
            '<div class="item-title">' + esc(item.title) + '</div>' +
            subHtml +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="item-badge">' +
        '<span class="badge-tag badge-' + (item.badge || 'revops') + '">' +
          esc(item.ownerDisplay) +
        '</span>' +
      '</div>';

    list.appendChild(a);
  });
}

// ── SLIDE NAV (Office.js) ────────────────────────────────────────────────────
function goToSlide(direction) {
  if (!window.Office || !Office.context || !Office.context.document) return;
  try {
    Office.context.document.goToByIdAsync(
      direction === 'next' ? Office.Index.Next : Office.Index.Previous,
      Office.GoToType.Index,
      function(result) {}
    );
  } catch (e) {}
}
function showSlideNav() {
  if (window.Office && Office.context && Office.context.document) {
    document.getElementById('btn-prev').style.display = 'inline-block';
    document.getElementById('btn-next').style.display = 'inline-block';
  }
}

// ── INIT ─────────────────────────────────────────────────────────────────────
function init() {
  showSlideNav();
  document.getElementById('call-date').textContent = fmtDate(new Date());

  fetch('data/agenda.json')
    .then(function(r) { if (!r.ok) throw 0; return r.json(); })
    .then(function(d) {
      if (d.meeting_date) {
        document.getElementById('call-date').textContent =
          fmtDate(new Date(d.meeting_date + 'T00:00:00'));
      }
      render(d.items && d.items.length ? d.items : DEFAULT_AGENDA);
    })
    .catch(function() { render(DEFAULT_AGENDA); });
}

var _initDone = false;
function safeInit() {
  if (_initDone) return;
  _initDone = true;
  init();
}
document.addEventListener('DOMContentLoaded', safeInit);
</script>
